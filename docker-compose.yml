version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ACTOR_API_KEY=${ACTOR_API_KEY}
      - CRITIC_API_KEY=${CRITIC_API_KEY}
    volumes:
      - ./logs:/app/logs
      - ./vault:/app/vault
      - ./runfiles:/app/runfiles

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
